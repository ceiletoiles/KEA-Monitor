name: KEA PGCET Monitor

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kea-pgcet-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Network diagnostics
        continue-on-error: true
        env:
          TARGET_URL: https://cetonline.karnataka.gov.in/kea/pgcet2026
        run: |
          set -u
          echo "=== DNS lookup ==="
          getent ahosts cetonline.karnataka.gov.in || true
          echo
          echo "=== IPv4 curl / HTTP-1.1 ==="
          curl -sS -v -L --http1.1 --connect-timeout 10 --max-time 30 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36 KEA-Monitor/1.0" \
            -o /dev/null "$TARGET_URL" || true
          echo
          echo "=== curl / HTTP-2 ==="
          curl -sS -v -L --http2 --connect-timeout 10 --max-time 30 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36 KEA-Monitor/1.0" \
            -o /dev/null "$TARGET_URL" || true
          echo
          echo "=== TLS certificate peek ==="
          echo | openssl s_client -servername cetonline.karnataka.gov.in -connect cetonline.karnataka.gov.in:443 -brief 2>/dev/null || true

      - name: Run monitor
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          REQUESTS_PROXY: ${{ secrets.REQUESTS_PROXY }}
          NETWORK_DIAGNOSTICS: ${{ vars.NETWORK_DIAGNOSTICS || '1' }}
          LOG_LEVEL: DEBUG
        run: python tracker.py
